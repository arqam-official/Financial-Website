<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings</title>
    <link rel="stylesheet" href="savings-style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div id="nav-bar">
            <img src="">
        </div>
    </nav>
    <h2 id="h2-1">Savings Goal Tracker</h2>
    <div id="add-new-goal">
        <h2>Add New Goal</h2>
        <input type="text" id="new-goal-name" placeholder="Goal Name (for e.g 'Trip to NewYork')">
        <br>
        <input type="number" id="new-goal-amount" placeholder="Goal Amount"> <br>
        <button id="new-goal-submit">Add Goal</button>

    </div>
    <br>
    <h2 id="h2-2">My Goals</h2>
    <div id="goals-names" class="goals-list">
        <p id="no-goals">No Goals Added Yet. Start Tracking!</p>
    </div>
    <script src="savings-script.js"></script>
</body>
</html>
